name: VaultCore CI Pipeline

on:
  push:
    branches:
      - master
      - main

  pull_request:
    branches:
      - master
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5

        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |

          python -m pip install --upgrade pip

          pip install -r requirements.txt

      - name: Check Python Syntax
        run: |

          python -m py_compile app.py

      - name: Run Basic Test
        run: |

          echo "VaultCore CI Running Successfully"