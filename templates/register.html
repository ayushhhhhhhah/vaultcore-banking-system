<!-- templates/register.html -->

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>VaultCore Register</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body class="auth-body">

<div class="overlay"></div>

<div class="auth-container">

    <div class="left-side">

        <h1>
            VaultCore
        </h1>

        <p>
            Create your secure banking account
        </p>

    </div>

    <div class="right-side">

        <form id="registerForm"
              class="auth-form">

            <h2>
                Register
            </h2>

            <input type="text"
                   id="first_name"
                   placeholder="First Name"
                   required>

            <input type="text"
                   id="middle_name"
                   placeholder="Middle Name">

            <input type="text"
                   id="last_name"
                   placeholder="Last Name"
                   required>

            <input type="email"
                   id="register_email"
                   placeholder="Email"
                   required>

            <input type="text"
                   id="phone"
                   placeholder="Phone Number"
                   required>

            <input type="password"
                   id="register_password"
                   placeholder="Password"
                   required>

            <button type="submit"
                    class="main-btn">

                Create Account

            </button>

            <p class="switch-text">

                Already have an account?

                <a href="/">
                    Login
                </a>

            </p>

        </form>

    </div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>
